<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agentic workflow security diagram</title>
  <desc id="desc">Premium flow diagram showing untrusted input, policy gateways, and auditable agent automation for AI security work.</desc>
  <defs>
    <linearGradient id="bg-agentic" x1="84" y1="28" x2="1110" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101421"/>
      <stop offset="1" stop-color="#181B2F"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#090D16"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-agentic)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#101621" stroke="#273149"/>

  <circle cx="178" cy="132" r="104" fill="#2F2547" fill-opacity="0.7"/>
  <circle cx="1016" cy="130" r="118" fill="#1A2A3C" fill-opacity="0.74"/>
  <circle cx="1034" cy="560" r="142" fill="#142435" fill-opacity="0.8"/>

  <text x="86" y="92" fill="#F5F8FC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Agentic Workflow Security</text>
  <text x="86" y="126" fill="#A8B7C9" font-family="Inter, Arial, sans-serif" font-size="18">Threat-modeling agent systems, scoping tool use, and keeping automated triage useful without unsafe autonomy.</text>

  <rect x="957" y="70" width="133" height="38" rx="19" fill="#181E2C" stroke="#313D58"/>
  <text x="1024" y="94" text-anchor="middle" fill="#E5EDF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">AI SECURITY</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#101824" stroke="#FFB36D" stroke-opacity="0.64" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#101824" stroke="#8AB4FF" stroke-opacity="0.62" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#101824" stroke="#60E6C4" stroke-opacity="0.58" stroke-width="2"/>

  <text x="116" y="230" fill="#FFD19A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">UNTRUSTED INPUT</text>
  <text x="116" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Prompts, alerts,</text>
  <text x="116" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">retrieval context</text>
  <text x="116" y="344" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">Treating input as adversarial keeps</text>
  <text x="116" y="371" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">prompt boundaries explicit.</text>

  <text x="481" y="230" fill="#B0CDFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">POLICY GATEWAY</text>
  <text x="481" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Scoped tools and</text>
  <text x="481" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">validated actions</text>
  <text x="481" y="344" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">Allowlists, parameter checks,</text>
  <text x="481" y="371" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">and permission boundaries mediate risk.</text>

  <text x="846" y="230" fill="#8EF0D3" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">AGENT WORKFLOW</text>
  <text x="846" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Triage, enrich,</text>
  <text x="846" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">audit, review</text>
  <text x="846" y="344" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">Python agents keep workflow state</text>
  <text x="846" y="371" fill="#B6C7D6" font-family="Inter, Arial, sans-serif" font-size="18">observable and easier to constrain.</text>

  <path d="M384 284H451" stroke="#FFB36D" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#8AB4FF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#FFB36D"/>
  <circle cx="782" cy="284" r="6" fill="#8AB4FF"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0E1420" stroke="#283148"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0E1420" stroke="#283148"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0E1420" stroke="#283148"/>

  <text x="116" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">1,000+ alerts/day</text>
  <text x="116" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Automation reduced repetitive</text>
  <text x="116" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">manual triage pressure.</text>

  <text x="481" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Policy-first</text>
  <text x="481" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Guardrails matter more than</text>
  <text x="481" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">demo-level autonomy.</text>

  <text x="846" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Auditable flow</text>
  <text x="846" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Tool use, decisions, and review</text>
  <text x="846" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">stay reconstructable after failure.</text>
</svg>
