<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">tinyc C99 Compiler architecture diagram</title>
  <desc id="desc">A compiler pipeline from source through lexer, parser, semantic analysis, IR, code generation, assembly, tests, and self-hosting stages.</desc>
  <rect width="1200" height="675" fill="#071018"/>
  <rect x="54" y="52" width="1092" height="571" rx="24" fill="#0d1722" stroke="#24435c" stroke-width="2"/>
  <text x="94" y="111" fill="#e8f4ff" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">tinyc C99 Compiler</text>
  <text x="94" y="148" fill="#9fb6ca" font-family="Inter, Arial, sans-serif" font-size="20">from-scratch frontend, TAC IR, x86-64 codegen, ABI tests, and self-hosting bootstrap</text>

  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="94" y="218" width="142" height="78" rx="10" fill="#12283a" stroke="#53d2b8"/>
    <text x="128" y="265" fill="#e8f4ff">Source C</text>
    <rect x="276" y="218" width="142" height="78" rx="10" fill="#132235" stroke="#74b8ff"/>
    <text x="321" y="265" fill="#e8f4ff">Lexer</text>
    <rect x="458" y="218" width="142" height="78" rx="10" fill="#132235" stroke="#74b8ff"/>
    <text x="501" y="265" fill="#e8f4ff">Parser</text>
    <rect x="640" y="218" width="142" height="78" rx="10" fill="#132235" stroke="#74b8ff"/>
    <text x="676" y="265" fill="#e8f4ff">Sema</text>
    <rect x="822" y="218" width="142" height="78" rx="10" fill="#132235" stroke="#74b8ff"/>
    <text x="859" y="265" fill="#e8f4ff">TAC IR</text>
    <rect x="1004" y="218" width="98" height="78" rx="10" fill="#12283a" stroke="#53d2b8"/>
    <text x="1028" y="265" fill="#e8f4ff">.s</text>
  </g>

  <g stroke="#5e7f9b" stroke-width="3" stroke-linecap="round">
    <path d="M236 257h40"/>
    <path d="M418 257h40"/>
    <path d="M600 257h40"/>
    <path d="M782 257h40"/>
    <path d="M964 257h40"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="94" y="384" width="286" height="128" rx="14" fill="#101f2d" stroke="#34566f"/>
    <text x="124" y="429" fill="#e8f4ff" font-size="24" font-weight="700">Validation</text>
    <text x="124" y="466" fill="#a9c2d7" font-size="18">unit + integration + ABI tests</text>
    <text x="124" y="494" fill="#a9c2d7" font-size="18">assemble, link, and execute outputs</text>

    <rect x="457" y="384" width="286" height="128" rx="14" fill="#101f2d" stroke="#34566f"/>
    <text x="487" y="429" fill="#e8f4ff" font-size="24" font-weight="700">ABI Slice</text>
    <text x="487" y="466" fill="#a9c2d7" font-size="18">struct pass/return classification</text>
    <text x="487" y="494" fill="#a9c2d7" font-size="18">register and memory-class paths</text>

    <rect x="820" y="384" width="282" height="128" rx="14" fill="#101f2d" stroke="#53d2b8"/>
    <text x="850" y="429" fill="#e8f4ff" font-size="24" font-weight="700">Self-host</text>
    <text x="850" y="466" fill="#a9c2d7" font-size="18">stage0 builds stage1</text>
    <text x="850" y="494" fill="#a9c2d7" font-size="18">stage1 builds matching stage2</text>
  </g>

  <g stroke="#53d2b8" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M1024 296c0 44-46 70-106 88"/>
    <path d="M916 380l-18 16 24 6"/>
  </g>
</svg>
