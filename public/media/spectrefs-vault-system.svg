<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SpectreFS secure vault diagram</title>
  <desc id="desc">Premium flow diagram showing encrypted storage, trusted-app access control, and desktop release surfaces for SpectreFS.</desc>
  <defs>
    <linearGradient id="bg-spectrefs" x1="82" y1="26" x2="1110" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12141C"/>
      <stop offset="1" stop-color="#1A1B28"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#0C0F15"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-spectrefs)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#131924" stroke="#282F40"/>

  <circle cx="162" cy="132" r="96" fill="#2A1B1A" fill-opacity="0.7"/>
  <circle cx="1020" cy="132" r="118" fill="#1D2031" fill-opacity="0.82"/>
  <circle cx="1040" cy="560" r="142" fill="#1A1C2D" fill-opacity="0.86"/>

  <text x="86" y="92" fill="#F4F7FB" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">SpectreFS Secure Vault</text>
  <text x="86" y="126" fill="#A8B6C7" font-family="Inter, Arial, sans-serif" font-size="18">Encrypted storage, trusted-app plaintext access, native desktop flows, and disciplined macOS release handling.</text>

  <rect x="923" y="70" width="167" height="38" rx="19" fill="#171E2B" stroke="#333E52"/>
  <text x="1006" y="94" text-anchor="middle" fill="#E4EDF6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">SECURITY PRODUCT</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#111723" stroke="#FF9C73" stroke-opacity="0.62" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#111723" stroke="#7CC4FF" stroke-opacity="0.58" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#111723" stroke="#8CF2DF" stroke-opacity="0.58" stroke-width="2"/>

  <text x="116" y="230" fill="#FFB18E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">ENCRYPTED VAULT</text>
  <text x="116" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Chunk-authenticated</text>
  <text x="116" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">storage at rest</text>
  <text x="116" y="344" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">Encrypted files, names, xattrs,</text>
  <text x="116" y="371" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">and Finder-compatible metadata.</text>

  <text x="481" y="230" fill="#A7D1FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">ACCESS BOUNDARY</text>
  <text x="481" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">PBAC and secure</text>
  <text x="481" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">plaintext exposure</text>
  <text x="481" y="344" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">Argon2id, wrapped keys, trusted</text>
  <text x="481" y="371" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">app controls, audit history.</text>

  <text x="846" y="230" fill="#92F1DF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">DESKTOP + RELEASE</text>
  <text x="846" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">SwiftUI shell and</text>
  <text x="846" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">shipping workflow</text>
  <text x="846" y="344" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">Mount mode, no-FUSE path,</text>
  <text x="846" y="371" fill="#B5C5D4" font-family="Inter, Arial, sans-serif" font-size="18">signing, notarization, QA gates.</text>

  <path d="M384 284H451" stroke="#FF9C73" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#7CC4FF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#FF9C73"/>
  <circle cx="782" cy="284" r="6" fill="#7CC4FF"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0E141F" stroke="#252F40"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0E141F" stroke="#252F40"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0E141F" stroke="#252F40"/>

  <text x="116" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Per-chunk AEAD</text>
  <text x="116" y="512" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">Random-access encryption with</text>
  <text x="116" y="537" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">authenticated chunk records.</text>

  <text x="481" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">PBAC</text>
  <text x="481" y="512" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">Trusted apps can read plaintext</text>
  <text x="481" y="537" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">while blocked reads stay audited.</text>

  <text x="846" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">10-step release gate</text>
  <text x="846" y="512" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">Build, test, sign, notarize, and</text>
  <text x="846" y="537" fill="#AFC1D0" font-family="Inter, Arial, sans-serif" font-size="17">package with QA before shipping.</text>
</svg>
