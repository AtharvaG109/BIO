<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sysguard eBPF monitor diagram</title>
  <desc id="desc">Premium flow diagram showing kernel hooks, a Rust policy runtime, and narrow enforcement in Sysguard.</desc>
  <defs>
    <linearGradient id="bg-sysguard" x1="100" y1="24" x2="1100" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1620"/>
      <stop offset="1" stop-color="#132232"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#09111A"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-sysguard)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#111A24" stroke="#203041"/>

  <circle cx="182" cy="130" r="100" fill="#14304A" fill-opacity="0.72"/>
  <circle cx="1018" cy="138" r="118" fill="#132435" fill-opacity="0.8"/>
  <circle cx="1028" cy="560" r="140" fill="#0E2130" fill-opacity="0.8"/>

  <text x="86" y="92" fill="#F1F8FF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Sysguard eBPF Monitor</text>
  <text x="86" y="126" fill="#A4B6C6" font-family="Inter, Arial, sans-serif" font-size="18">Linux-first runtime tracing with a Rust policy engine and explicit outbound enforcement scope.</text>

  <rect x="959" y="70" width="131" height="38" rx="19" fill="#172330" stroke="#2B4157"/>
  <text x="1025" y="94" text-anchor="middle" fill="#E2EEF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">SYSTEMS · 2026</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#10202D" stroke="#7DC0FF" stroke-opacity="0.58" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#10202D" stroke="#5EEAD4" stroke-opacity="0.58" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#10202D" stroke="#FFB768" stroke-opacity="0.65" stroke-width="2"/>

  <text x="116" y="230" fill="#A7D3FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">KERNEL HOOKS</text>
  <text x="116" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">execve, openat,</text>
  <text x="116" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">connect events</text>
  <text x="116" y="344" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">eBPF programs stream activity</text>
  <text x="116" y="371" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">out of Linux tracepoints.</text>

  <text x="481" y="230" fill="#88F1DE" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">RUST POLICY RUNTIME</text>
  <text x="481" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Noise control,</text>
  <text x="481" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">dedupe, outputs</text>
  <text x="481" y="344" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">Tokio and Aya power readable</text>
  <text x="481" y="371" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">events plus JSON reporting.</text>

  <text x="846" y="230" fill="#FFD39A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">TARGETED ENFORCEMENT</text>
  <text x="846" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">YAML rules and</text>
  <text x="846" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">cgroup connect4</text>
  <text x="846" y="344" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">ALLOW, LOG, ALERT, BLOCK,</text>
  <text x="846" y="371" fill="#B6C9D6" font-family="Inter, Arial, sans-serif" font-size="18">with honest outbound-only scope.</text>

  <path d="M384 284H451" stroke="#7DC0FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#7DC0FF"/>
  <circle cx="782" cy="284" r="6" fill="#5EEAD4"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0E1823" stroke="#203141"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0E1823" stroke="#203141"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0E1823" stroke="#203141"/>

  <text x="116" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">3 event types</text>
  <text x="116" y="512" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">Process, file, and network</text>
  <text x="116" y="537" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">activity observed on Linux.</text>

  <text x="481" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Four policy outcomes</text>
  <text x="481" y="512" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">Readable classifications with</text>
  <text x="481" y="537" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">noise suppression and dedupe.</text>

  <text x="846" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Linux-first honesty</text>
  <text x="846" y="512" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">A public prototype with narrow,</text>
  <text x="846" y="537" fill="#AFC2D0" font-family="Inter, Arial, sans-serif" font-size="17">explicitly testable enforcement.</text>
</svg>
