<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Neonatal screening publication diagram</title>
  <desc id="desc">Premium flow diagram showing screening workflow, decision logic, and published communication for the neonatal screening project.</desc>
  <defs>
    <linearGradient id="bg-neonatal" x1="80" y1="30" x2="1120" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B2A"/>
      <stop offset="1" stop-color="#1C2335"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#0B1017"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-neonatal)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#111A25" stroke="#27364A"/>

  <circle cx="168" cy="130" r="104" fill="#193F63" fill-opacity="0.6"/>
  <circle cx="1018" cy="126" r="116" fill="#443625" fill-opacity="0.55"/>
  <circle cx="1032" cy="558" r="142" fill="#2D3149" fill-opacity="0.76"/>

  <text x="86" y="92" fill="#F4F8FC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Neonatal Screening Publication</text>
  <text x="86" y="126" fill="#A9B7C8" font-family="Inter, Arial, sans-serif" font-size="18">A healthcare-oriented workflow translated from implementation and validation into a publishable technical artifact.</text>

  <rect x="952" y="70" width="138" height="38" rx="19" fill="#172232" stroke="#31445C"/>
  <text x="1021" y="94" text-anchor="middle" fill="#E5EDF6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">PUBLICATION</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#0F1925" stroke="#8AB4FF" stroke-opacity="0.62" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#0F1925" stroke="#F4C96C" stroke-opacity="0.64" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#0F1925" stroke="#B9A4FF" stroke-opacity="0.62" stroke-width="2"/>

  <text x="116" y="230" fill="#AED2FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">SCREENING FLOW</text>
  <text x="116" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Risk signals and</text>
  <text x="116" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">clinical clarity</text>
  <text x="116" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">The application flow centers on</text>
  <text x="116" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">clear screening-path decisions.</text>

  <text x="481" y="230" fill="#F9D98D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">DECISION LOGIC</text>
  <text x="481" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Validation and</text>
  <text x="481" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">workflow framing</text>
  <text x="481" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">Implementation detail stays tied</text>
  <text x="481" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">to explainable clinical use.</text>

  <text x="846" y="230" fill="#D1C1FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">PUBLISHED OUTPUT</text>
  <text x="846" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Research narrative</text>
  <text x="846" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">with system context</text>
  <text x="846" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">Architecture and findings become</text>
  <text x="846" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">a publishable technical story.</text>

  <path d="M384 284H451" stroke="#8AB4FF" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#F4C96C" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#8AB4FF"/>
  <circle cx="782" cy="284" r="6" fill="#F4C96C"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#263449"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#263449"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#263449"/>

  <text x="116" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Published</text>
  <text x="116" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">The work landed as a formal</text>
  <text x="116" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">IJRASET research artifact.</text>

  <text x="481" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Healthcare framing</text>
  <text x="481" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Usability and workflow clarity</text>
  <text x="481" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">matter as much as the logic.</text>

  <text x="846" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">End-to-end communication</text>
  <text x="846" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Problem framing, implementation,</text>
  <text x="846" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">and written delivery reinforce each other.</text>
</svg>
