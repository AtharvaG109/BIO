<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Patchbot security platform diagram</title>
  <desc id="desc">Premium flow diagram showing attack emulation, secret detection, and secure multi-tenant delivery for Patchbot.</desc>
  <defs>
    <linearGradient id="bg-patchbot" x1="82" y1="30" x2="1120" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11161E"/>
      <stop offset="1" stop-color="#191F2B"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#0C1117"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-patchbot)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#141B24" stroke="#263240"/>

  <circle cx="170" cy="126" r="98" fill="#142632"/>
  <circle cx="1018" cy="130" r="118" fill="#1B2230"/>
  <circle cx="1040" cy="565" r="144" fill="#171D2A"/>

  <text x="86" y="92" fill="#F2F6FA" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Patchbot Security Platform</text>
  <text x="86" y="126" fill="#A7B6C3" font-family="Inter, Arial, sans-serif" font-size="18">Autonomous attack emulation, high-entropy secret detection, and tenant-safe security delivery.</text>

  <rect x="936" y="70" width="154" height="38" rx="19" fill="#17202A" stroke="#2A3947"/>
  <text x="1013" y="94" text-anchor="middle" fill="#DFEAF2" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">SECURITY PRODUCT</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#111924" stroke="#5EEAD4" stroke-opacity="0.55" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#111924" stroke="#7CC4FF" stroke-opacity="0.58" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#111924" stroke="#F3C969" stroke-opacity="0.6" stroke-width="2"/>

  <text x="116" y="230" fill="#89F1DD" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">WEB SCAN STAGE</text>
  <text x="116" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">IAST-style exploit</text>
  <text x="116" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">confirmation</text>
  <text x="116" y="344" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">Playwright sessions validate</text>
  <text x="116" y="371" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">real browser attack paths.</text>

  <text x="481" y="230" fill="#9CCFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">HEURISTIC REVIEW</text>
  <text x="481" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Entropy scoring</text>
  <text x="481" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">for secret leaks</text>
  <text x="481" y="344" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">Commit data analysis catches</text>
  <text x="481" y="371" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">high-risk strings with context.</text>

  <text x="846" y="230" fill="#F7D98A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">TENANT-SAFE DELIVERY</text>
  <text x="846" y="274" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Encrypted storage</text>
  <text x="846" y="309" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">and GitHub flow</text>
  <text x="846" y="344" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">SQLCipher and namespace</text>
  <text x="846" y="371" fill="#B3C4D0" font-family="Inter, Arial, sans-serif" font-size="18">boundaries protect delivery data.</text>

  <path d="M384 284H451" stroke="#5EEAD4" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#7CC4FF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#5EEAD4"/>
  <circle cx="782" cy="284" r="6" fill="#7CC4FF"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#101722" stroke="#232F3C"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#101722" stroke="#232F3C"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#101722" stroke="#232F3C"/>

  <text x="116" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">IAST</text>
  <text x="116" y="512" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">Headless confirmation keeps</text>
  <text x="116" y="537" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">findings closer to real exploits.</text>

  <text x="481" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">High-entropy detection</text>
  <text x="481" y="512" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">Statistical models reduce noise</text>
  <text x="481" y="537" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">while surfacing likely secrets.</text>

  <text x="846" y="480" fill="#F4FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">SQLCipher + isolation</text>
  <text x="846" y="512" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">Encrypted-at-rest storage and</text>
  <text x="846" y="537" fill="#AFC0CD" font-family="Inter, Arial, sans-serif" font-size="17">multi-tenant data boundaries.</text>
</svg>
