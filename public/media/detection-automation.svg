<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Detection and IAM automation diagram</title>
  <desc id="desc">Premium flow diagram showing centralized logs, behavior rules, and certificate lifecycle automation for detection engineering work.</desc>
  <defs>
    <linearGradient id="bg-detection" x1="84" y1="28" x2="1110" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F141D"/>
      <stop offset="1" stop-color="#161D2C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#090E15"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-detection)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#101721" stroke="#243347"/>

  <circle cx="172" cy="132" r="102" fill="#153245" fill-opacity="0.7"/>
  <circle cx="1016" cy="130" r="118" fill="#1E2638" fill-opacity="0.8"/>
  <circle cx="1034" cy="560" r="142" fill="#132230" fill-opacity="0.82"/>

  <text x="86" y="92" fill="#F4F8FC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Security Monitoring and IAM Automation</text>
  <text x="86" y="126" fill="#A8B7C8" font-family="Inter, Arial, sans-serif" font-size="18">Centralized visibility, behavior-based detections, and zero-downtime trust lifecycle workflows.</text>

  <rect x="960" y="70" width="130" height="38" rx="19" fill="#172331" stroke="#30465B"/>
  <text x="1025" y="94" text-anchor="middle" fill="#E4EDF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">DETECTION</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#101924" stroke="#7FDFFF" stroke-opacity="0.64" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#101924" stroke="#6BE3BF" stroke-opacity="0.58" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#101924" stroke="#F6C96A" stroke-opacity="0.62" stroke-width="2"/>

  <text x="116" y="230" fill="#A9E7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">CENTRALIZED LOGS</text>
  <text x="116" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">13+ systems into</text>
  <text x="116" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">shared ELK flow</text>
  <text x="116" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">A common operational picture</text>
  <text x="116" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">supports correlation and triage.</text>

  <text x="481" y="230" fill="#92F0D1" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">BEHAVIOR RULES</text>
  <text x="481" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Detection and</text>
  <text x="481" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">response triggers</text>
  <text x="481" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">Higher-confidence alerts come</text>
  <text x="481" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">from patterns, not raw volume.</text>

  <text x="846" y="230" fill="#F8DA8E" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">TRUST LIFECYCLE</text>
  <text x="846" y="274" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Certificates and</text>
  <text x="846" y="309" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">IAM automation</text>
  <text x="846" y="344" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">Key rotation and certificate flows</text>
  <text x="846" y="371" fill="#B7C7D7" font-family="Inter, Arial, sans-serif" font-size="18">stay reliable without downtime.</text>

  <path d="M384 284H451" stroke="#7FDFFF" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#6BE3BF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#7FDFFF"/>
  <circle cx="782" cy="284" r="6" fill="#6BE3BF"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#26354A"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#26354A"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0D151F" stroke="#26354A"/>

  <text x="116" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">13+ systems</text>
  <text x="116" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Shared visibility across a wide</text>
  <text x="116" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">distributed operational surface.</text>

  <text x="481" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Zero downtime goal</text>
  <text x="481" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">Automated trust maintenance</text>
  <text x="481" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">without breaking operations.</text>

  <text x="846" y="480" fill="#F5FAFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Compliance-aware</text>
  <text x="846" y="512" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">PCI DSS and NIST expectations</text>
  <text x="846" y="537" fill="#AFC1D1" font-family="Inter, Arial, sans-serif" font-size="17">are built into the operating model.</text>
</svg>
