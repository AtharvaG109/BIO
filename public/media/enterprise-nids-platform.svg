<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise NIDS architecture diagram</title>
  <desc id="desc">Premium flow diagram showing capture, detection, and reporting surfaces for the Enterprise NIDS platform.</desc>
  <defs>
    <linearGradient id="bg-nids" x1="80" y1="30" x2="1120" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09151C"/>
      <stop offset="1" stop-color="#0E2430"/>
    </linearGradient>
    <linearGradient id="panel-nids" x1="110" y1="74" x2="1070" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1D26"/>
      <stop offset="1" stop-color="#112B38"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="34" fill="#061017"/>
  <rect x="24" y="24" width="1152" height="627" rx="28" fill="url(#bg-nids)"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="url(#panel-nids)" stroke="#173545"/>

  <circle cx="170" cy="132" r="104" fill="#123344" fill-opacity="0.75"/>
  <circle cx="1015" cy="134" r="118" fill="#173949" fill-opacity="0.7"/>
  <circle cx="1036" cy="558" r="138" fill="#0D2836" fill-opacity="0.8"/>

  <text x="86" y="92" fill="#E7FAF5" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Enterprise NIDS</text>
  <text x="86" y="126" fill="#9EB9C7" font-family="Inter, Arial, sans-serif" font-size="18">Offline and live network detection platform with explainable reporting and runtime visibility.</text>

  <rect x="917" y="70" width="173" height="38" rx="19" fill="#102430" stroke="#224658"/>
  <text x="1003" y="94" text-anchor="middle" fill="#DDEBF2" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">SECURITY PRODUCT · 2026</text>

  <rect x="86" y="186" width="298" height="196" rx="24" fill="#11222C" stroke="#59E6C3" stroke-opacity="0.65" stroke-width="2"/>
  <rect x="451" y="186" width="298" height="196" rx="24" fill="#11222C" stroke="#74B8FF" stroke-opacity="0.65" stroke-width="2"/>
  <rect x="816" y="186" width="298" height="196" rx="24" fill="#11222C" stroke="#FFB45D" stroke-opacity="0.72" stroke-width="2"/>

  <text x="116" y="230" fill="#8DECD4" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">CAPTURE SURFACE</text>
  <text x="116" y="274" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Offline PCAP</text>
  <text x="116" y="309" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">and live intake</text>
  <text x="116" y="344" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">DPKT, Scapy, flow tracking,</text>
  <text x="116" y="371" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">and TCP stream rebuild.</text>

  <text x="481" y="230" fill="#9FCBFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">DETECTION ENGINE</text>
  <text x="481" y="274" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Heuristics, ML,</text>
  <text x="481" y="309" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">JA3, p0f, DPI</text>
  <text x="481" y="344" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">Anomaly scoring, fingerprinting,</text>
  <text x="481" y="371" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">and payload carving layers.</text>

  <text x="846" y="230" fill="#FFD39A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">REPORTING + API</text>
  <text x="846" y="274" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">Readable findings</text>
  <text x="846" y="309" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">and operator flow</text>
  <text x="846" y="344" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">Markdown, JSON, Mermaid,</text>
  <text x="846" y="371" fill="#B7CAD5" font-family="Inter, Arial, sans-serif" font-size="18">FastAPI dashboard, replay.</text>

  <path d="M384 284H451" stroke="#59E6C3" stroke-width="5" stroke-linecap="round"/>
  <path d="M749 284H816" stroke="#74B8FF" stroke-width="5" stroke-linecap="round"/>
  <circle cx="417" cy="284" r="6" fill="#59E6C3"/>
  <circle cx="782" cy="284" r="6" fill="#74B8FF"/>

  <rect x="86" y="440" width="298" height="126" rx="22" fill="#0D1B24" stroke="#1D3C4C"/>
  <rect x="451" y="440" width="298" height="126" rx="22" fill="#0D1B24" stroke="#1D3C4C"/>
  <rect x="816" y="440" width="298" height="126" rx="22" fill="#0D1B24" stroke="#1D3C4C"/>

  <text x="116" y="480" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">2 analysis modes</text>
  <text x="116" y="512" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">The same codebase handles</text>
  <text x="116" y="537" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">offline replay and live capture.</text>

  <text x="481" y="480" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Explainable output</text>
  <text x="481" y="512" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">Incident stories, protocol maps,</text>
  <text x="481" y="537" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">and readable forensic artifacts.</text>

  <text x="846" y="480" fill="#F5FBFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">FastAPI + SQLite</text>
  <text x="846" y="512" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">Dashboard, telemetry, health,</text>
  <text x="846" y="537" fill="#AFC4D1" font-family="Inter, Arial, sans-serif" font-size="17">operations feed, and uploads.</text>
</svg>
