name: Bug report
description: Report a broken page, regression, or deployment issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: The projects page fails to render after build...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share a short sequence that reproduces the issue.
      placeholder: |
        1. Run npm run build
        2. Open the generated page
        3. See the broken asset path
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, or deployment target.
      placeholder: Chrome 136 on macOS / GitHub Pages
